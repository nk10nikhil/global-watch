    <!-- Theme: apply stored preference before first paint to prevent FOUC -->
    <script>
      (function () {
        try {
          var h = location.hostname;
          var v;
          if (h.startsWith("happy.")) v = "happy";
          else if (h.startsWith("tech.")) v = "tech";
          else if (h.startsWith("finance.")) v = "finance";
          if (
            !v &&
            (h === "localhost" ||
              h === "127.0.0.1" ||
              "__TAURI_INTERNALS__" in window)
          )
            v = localStorage.getItem("globalwatch-variant");
          if (v) document.documentElement.dataset.variant = v;
          else document.documentElement.removeAttribute("data-variant");
          var t = localStorage.getItem("globalwatch-theme");
          if (t === "dark" || t === "light") {
            document.documentElement.dataset.theme = t;
          } else if (v === "happy") {
            document.documentElement.dataset.theme = "light";
          }
        } catch (e) {}
        document.documentElement.classList.add("no-transition");
      })();
    </script>

      .skeleton-pill {

      }
      .skeleton-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;

      }
      .skeleton-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;

      }
      .skeleton-map {
        height: 50vh;

        display: flex;
        flex-direction: column;

      .skeleton-map-bar {
        height: 32px;
        display: flex;
        align-items: center;
        padding: 0 12px;
        background: #141414;
        border-bottom: 1px solid #2a2a2a;
      }
      .skeleton-map-body {
        flex: 1;
        position: relative;
        overflow: hidden;
      }
      .skeleton-map-body::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse 60% 50% at 50% 50%,
          #0a2a20 0%,
          #020a08 100%
        );
        opacity: 0.5;
      }
      .skeleton-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 4px;
        padding: 4px;
        align-content: start;
      }
      .skeleton-panel {
        height: 320px;
        background: #141414;
        border: 1px solid #2a2a2a;
        border-radius: 0;
        display: flex;
        flex-direction: column;
      }
      .skeleton-panel-header {
        height: 36px;
        display: flex;
        align-items: center;
        padding: 0 12px;
        border-bottom: 1px solid #1a1a1a;
      }
      .skeleton-panel-body {
        flex: 1;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .skeleton-line {
        height: 14px;
        border-radius: 4px;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.05) 25%,
          rgba(255, 255, 255, 0.1) 50%,
          rgba(255, 255, 255, 0.05) 75%
        );
        background-size: 200% 100%;
        animation: skel-shimmer 1.5s infinite;
      }
      .skeleton-line.w75 {
        width: 75%;
      }
      .skeleton-line.w60 {
        width: 60%;
      }
      .skeleton-line.w50 {
        width: 50%;
      }
      .skeleton-line.w85 {
        width: 85%;
      }
      .skeleton-line.w40 {
        width: 40%;
      }

      @keyframes skel-shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }

    <!-- Force-clear stale service worker if module scripts 404 (post-deploy cache mismatch) -->
    <script>
      (function () {
        if (!("serviceWorker" in navigator)) return;
        var key = "wm-sw-nuke";
        if (sessionStorage.getItem(key)) return;
        window.addEventListener(
          "error",
          function (e) {
            var u = (e.target && (e.target.src || e.target.href)) || "";
            if (u && /\/assets\//.test(u)) {
              sessionStorage.setItem(key, "1");
              navigator.serviceWorker.getRegistrations().then(function (regs) {
                var p = regs.map(function (r) {
                  return r.unregister();
                });
                Promise.all(p).then(function () {
                  if (caches && caches.keys) {
                    caches
                      .keys()
                      .then(function (ks) {
                        return Promise.all(
                          ks.map(function (k) {
                            return caches.delete(k);
                          }),
                        );
                      })
                      .then(function () {
                        location.reload();
                      });
                  } else {
                    location.reload();
                  }
                });
              });
            }
          },
          true,
        );
      })();
    </script>
